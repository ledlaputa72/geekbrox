<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="140" viewBox="0 0 100 140">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2A0A3A" stop-opacity="1"/><stop offset="100%" stop-color="#18062A" stop-opacity="1"/></linearGradient><linearGradient id="art" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="rgba(0,0,0,0)" stop-opacity="1"/><stop offset="100%" stop-color="#18062A" stop-opacity="1"/></linearGradient></defs>
  
  <!-- card body -->
