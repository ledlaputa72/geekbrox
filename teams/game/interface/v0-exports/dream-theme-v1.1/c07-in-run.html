<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Collector - In Run</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: #1A1A2E;
      color: #FFFFFF;
      overflow: hidden;
    }
    #root {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;

    const nodes = [
      { id: 1, type: 'Memory', icon: '💎', completed: true, current: false },
      { id: 2, type: 'Combat', icon: '⚔️', completed: true, current: false },
      { id: 3, type: 'Event', icon: '❓', completed: false, current: true },
      { id: 4, type: 'Shop', icon: '🛒', completed: false, current: false },
      { id: 5, type: 'Combat', icon: '⚔️', completed: false, current: false },
      { id: 6, type: 'Upgrade', icon: '⬆️', completed: false, current: false },
      { id: 7, type: 'Memory', icon: '💎', completed: false, current: false },
      { id: 8, type: 'Combat', icon: '⚔️', completed: false, current: false },
      { id: 9, type: 'Event', icon: '❓', completed: false, current: false },
      { id: 10, type: 'Boss', icon: '👹', completed: false, current: false }
    ];

    const InRun = () => {
      const [hp, setHp] = useState(6);
      const [maxHp, setMaxHp] = useState(10);
      const [energy, setEnergy] = useState(2);
      const [maxEnergy, setMaxEnergy] = useState(3);
      const [reveries, setReveries] = useState(125);

      const currentNode = nodes.find(n => n.current);
      const hpPercent = (hp / maxHp) * 100;
      const energyPercent = (energy / maxEnergy) * 100;

      const getHpColor = () => {
        if (hpPercent > 60) return '#4CAF50';
        if (hpPercent > 30) return '#FFC107';
        return '#F44336';
      };

      return (
        <div style={{
          width: '390px',
          height: '844px',
          background: 'linear-gradient(180deg, #1A1A2E 0%, #2C3E50 100%)',
          position: 'relative',
          overflow: 'hidden'
        }}>
          {/* Particle Background */}
          <div style={{
            position: 'absolute',
            width: '100%',
            height: '100%',
            opacity: 0.3
          }}>
            {[...Array(20)].map((_, i) => (
              <div
                key={i}
                style={{
                  position: 'absolute',
                  width: '4px',
                  height: '4px',
                  borderRadius: '50%',
                  background: '#FFFFFF',
                  left: `${Math.random() * 100}%`,
                  top: `${Math.random() * 100}%`,
                  animation: `float ${3 + Math.random() * 2}s infinite ease-in-out`
                }}
              />
            ))}
          </div>

          {/* Status Bar */}
          <div style={{
            height: '50px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            padding: '0 20px',
            background: 'rgba(26, 26, 46, 0.9)',
            position: 'relative',
            zIndex: 10
          }}>
            {/* HP Bar */}
            <div style={{ flex: 1, marginRight: '10px' }}>
              <div style={{
                width: '100%',
                height: '20px',
                background: '#333333',
                borderRadius: '10px',
                overflow: 'hidden',
                position: 'relative'
              }}>
                <div style={{
                  width: `${hpPercent}%`,
                  height: '100%',
                  background: getHpColor(),
                  transition: 'width 0.3s'
                }}></div>
                <div style={{
                  position: 'absolute',
                  top: 0,
                  left: 0,
                  width: '100%',
                  height: '100%',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  fontSize: '12px',
                  fontWeight: 'bold'
                }}>
                  HP: {hp}/{maxHp}
                </div>
              </div>
            </div>

            {/* Energy */}
            <div style={{ marginRight: '10px' }}>
              <div style={{
                width: '60px',
                height: '20px',
                background: '#333333',
                borderRadius: '10px',
                overflow: 'hidden',
                position: 'relative'
              }}>
                <div style={{
                  width: `${energyPercent}%`,
                  height: '100%',
                  background: '#2196F3',
                  transition: 'width 0.3s'
                }}></div>
                <div style={{
                  position: 'absolute',
                  top: 0,
                  left: 0,
                  width: '100%',
                  height: '100%',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  fontSize: '12px',
                  fontWeight: 'bold'
                }}>
                  EN: {energy}/{maxEnergy}
                </div>
              </div>
            </div>

            {/* Reveries */}
            <div style={{ fontSize: '14px', fontWeight: 'bold', color: '#FFD700' }}>
              R: {reveries}
            </div>
          </div>

          {/* Node Map */}
          <div style={{
            height: '80px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            padding: '0 20px',
            position: 'relative',
            zIndex: 10
          }}>
            <div style={{
              display: 'flex',
              alignItems: 'center',
              gap: '8px'
            }}>
              {nodes.map((node, index) => (
                <React.Fragment key={node.id}>
                  <div style={{
                    width: '24px',
                    height: '24px',
                    borderRadius: '50%',
                    background: node.completed ? '#4CAF50' : 
                                node.current ? '#7B9EF0' : '#666666',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    fontSize: '12px',
                    border: node.current ? '3px solid #FFFFFF' : 'none',
                    animation: node.current ? 'pulse 2s infinite' : 'none',
                    cursor: 'pointer'
                  }}>
                    {node.icon}
                  </div>
                  {index < nodes.length - 1 && (
                    <div style={{
                      width: '16px',
                      height: '2px',
                      background: nodes[index + 1].completed || nodes[index + 1].current ? '#4CAF50' : '#666666'
                    }}></div>
                  )}
                </React.Fragment>
              ))}
            </div>
          </div>

          {/* Main View */}
          <div style={{
            height: '400px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            position: 'relative',
            zIndex: 5
          }}>
            <div style={{
              fontSize: '96px',
              animation: 'float 3s infinite ease-in-out'
            }}>
              {currentNode.icon}
            </div>
          </div>

          {/* Node Info Panel */}
          <div style={{
            position: 'absolute',
            bottom: 0,
            left: 0,
            width: '100%',
            height: '200px',
            background: 'rgba(44, 44, 62, 0.95)',
            borderRadius: '16px 16px 0 0',
            padding: '20px',
            boxShadow: '0 -4px 8px rgba(0,0,0,0.3)',
            zIndex: 10
          }}>
            <div style={{
              fontSize: '20px',
              fontWeight: 'bold',
              marginBottom: '12px'
            }}>
              Current Node: {currentNode.type} {currentNode.icon}
            </div>

            {currentNode.type === 'Event' && (
              <>
                <div style={{
                  fontSize: '14px',
                  color: '#AAAAAA',
                  marginBottom: '16px'
                }}>
                  "Two paths diverge..."
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                  <button style={{
                    width: '100%',
                    height: '44px',
                    borderRadius: '8px',
                    border: 'none',
                    background: '#5A7FC0',
                    color: '#FFFFFF',
                    fontFamily: 'Nunito',
                    fontWeight: 'bold',
                    fontSize: '16px',
                    cursor: 'pointer',
                    textAlign: 'left',
                    padding: '0 16px'
                  }}>
                    [A] Safe path (20 R)
                  </button>
                  <button style={{
                    width: '100%',
                    height: '44px',
                    borderRadius: '8px',
                    border: 'none',
                    background: '#9C27B0',
                    color: '#FFFFFF',
                    fontFamily: 'Nunito',
                    fontWeight: 'bold',
                    fontSize: '16px',
                    cursor: 'pointer',
                    textAlign: 'left',
                    padding: '0 16px'
                  }}>
                    [B] Risky path (50% chance 50R)
                  </button>
                </div>
              </>
            )}

            {currentNode.type === 'Memory' && (
              <>
                <div style={{
                  fontSize: '14px',
                  marginBottom: '16px'
                }}>
                  10 Reveries collected
                </div>
                <button style={{
                  width: '100%',
                  height: '44px',
                  borderRadius: '8px',
                  border: 'none',
                  background: '#5A7FC0',
                  color: '#FFFFFF',
                  fontFamily: 'Nunito',
                  fontWeight: 'bold',
                  fontSize: '16px',
                  cursor: 'pointer'
                }}>
                  Collect
                </button>
              </>
            )}
          </div>

          {/* Bottom Action Bar */}
          <div style={{
            position: 'absolute',
            bottom: '210px',
            left: 0,
            width: '100%',
            height: '60px',
            display: 'flex',
            justifyContent: 'space-around',
            alignItems: 'center',
            padding: '0 20px',
            background: 'rgba(26, 26, 46, 0.9)',
            zIndex: 10
          }}>
            <button style={{
              width: '100px',
              height: '44px',
              borderRadius: '8px',
              border: 'none',
              background: '#5A7FC0',
              color: '#FFFFFF',
              fontFamily: 'Nunito',
              fontWeight: 'bold',
              cursor: 'pointer'
            }}>
              ⏩ Skip
            </button>
            <button style={{
              width: '100px',
              height: '44px',
              borderRadius: '8px',
              border: 'none',
              background: '#5A7FC0',
              color: '#FFFFFF',
              fontFamily: 'Nunito',
              fontWeight: 'bold',
              cursor: 'pointer'
            }}>
              🤖 Auto
            </button>
            <button style={{
              width: '100px',
              height: '44px',
              borderRadius: '8px',
              border: 'none',
              background: '#5A7FC0',
              color: '#FFFFFF',
              fontFamily: 'Nunito',
              fontWeight: 'bold',
              cursor: 'pointer'
            }}>
              ☰ Menu
            </button>
          </div>
        </div>
      );
    };

    ReactDOM.render(<InRun />, document.getElementById('root'));
  </script>
</body>
</html>
