<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Collector - Card Library</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: #1A1A2E;
      color: #FFFFFF;
      overflow: hidden;
    }
    #root {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Mock card data (85 cards total)
    const generateCards = () => {
      const rarities = ['Common', 'Uncommon', 'Rare', 'Epic', 'Legendary'];
      const types = ['Attack', 'Defense', 'Collection', 'Synergy'];
      const tags = ['Nightmare', 'Memory', 'Lucid'];
      const cards = [];
      
      for (let i = 1; i <= 85; i++) {
        const owned = Math.random() > 0.5;
        const rarity = rarities[Math.floor(Math.random() * rarities.length)];
        cards.push({
          id: i,
          name: owned ? `Card ${i}` : '???',
          cost: Math.floor(Math.random() * 5) + 1,
          type: types[Math.floor(Math.random() * types.length)],
          rarity: rarity,
          tag: tags[Math.floor(Math.random() * tags.length)],
          owned: owned,
          description: `This is the description for Card ${i}. It has special effects.`
        });
      }
      return cards;
    };

    const getRarityGradient = (rarity, owned) => {
      const gradients = {
        Common: 'linear-gradient(135deg, #AAAAAA 0%, #CCCCCC 100%)',
        Uncommon: 'linear-gradient(135deg, #4CAF50 0%, #81C784 100%)',
        Rare: 'linear-gradient(135deg, #2196F3 0%, #64B5F6 100%)',
        Epic: 'linear-gradient(135deg, #9C27B0 0%, #BA68C8 100%)',
        Legendary: 'linear-gradient(135deg, #FFC107 0%, #FFD54F 100%)'
      };
      return owned ? gradients[rarity] : '#555555';
    };

    // Bottom Tab Bar Component
    const BottomTabBar = ({ activeTab }) => {
      const tabs = [
        { id: 'home', icon: '🏠', label: 'Home' },
        { id: 'cards', icon: '🎴', label: 'Cards' },
        { id: 'upgrade', icon: '⬆️', label: 'Upgrade' },
        { id: 'progress', icon: '📊', label: 'Progress' },
        { id: 'shop', icon: '🛒', label: 'Shop' }
      ];

      return (
        <div style={{
          position: 'absolute',
          bottom: 0,
          left: 0,
          width: '390px',
          height: '60px',
          background: '#2C2C3E',
          borderTop: '1px solid #1A1A2E',
          display: 'flex',
          justifyContent: 'space-around',
          alignItems: 'center',
          zIndex: 100
        }}>
          {tabs.map(tab => (
            <div
              key={tab.id}
              style={{
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                gap: '4px',
                cursor: tab.id === 'progress' ? 'not-allowed' : 'pointer',
                opacity: tab.id === 'progress' ? 0.4 : 1
              }}
            >
              <div style={{
                fontSize: '24px',
                filter: activeTab === tab.id ? 'none' : 'grayscale(100%)',
                opacity: activeTab === tab.id ? 1 : 0.6
              }}>
                {tab.icon}
              </div>
              <div style={{
                fontSize: '12px',
                fontFamily: 'Nunito',
                color: activeTab === tab.id ? '#FFFFFF' : '#888888',
                fontWeight: activeTab === tab.id ? 'bold' : 'normal'
              }}>
                {tab.label}
              </div>
            </div>
          ))}
        </div>
      );
    };

    const CardLibrary = () => {
      const [cards, setCards] = useState([]);
      const [filteredCards, setFilteredCards] = useState([]);
      const [selectedCard, setSelectedCard] = useState(null);
      const [typeFilter, setTypeFilter] = useState('All');
      const [rarityFilter, setRarityFilter] = useState('All');
      const [searchTerm, setSearchTerm] = useState('');

      useEffect(() => {
        const allCards = generateCards();
        setCards(allCards);
        setFilteredCards(allCards);
      }, []);

      useEffect(() => {
        let filtered = cards;
        
        if (typeFilter !== 'All') {
          filtered = filtered.filter(c => c.type === typeFilter);
        }
        if (rarityFilter !== 'All') {
          filtered = filtered.filter(c => c.rarity === rarityFilter);
        }
        if (searchTerm) {
          filtered = filtered.filter(c => 
            c.name.toLowerCase().includes(searchTerm.toLowerCase())
          );
        }
        
        setFilteredCards(filtered);
      }, [typeFilter, rarityFilter, searchTerm, cards]);

      const stats = cards.reduce((acc, card) => {
        if (card.owned) {
          acc.total++;
          acc[card.rarity] = (acc[card.rarity] || 0) + 1;
        }
        return acc;
      }, { total: 0, Common: 0, Uncommon: 0, Rare: 0, Epic: 0, Legendary: 0 });

      return (
        <div style={{
          width: '390px',
          height: '844px',
          background: '#1A1A2E',
          position: 'relative',
          overflow: 'hidden'
        }}>
          {/* Header */}
          <div style={{
            height: '60px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            padding: '0 20px',
            background: '#2C2C3E'
          }}>
            <button style={{
              background: 'none',
              border: 'none',
              color: '#FFFFFF',
              fontSize: '24px',
              cursor: 'pointer'
            }}>←</button>
            <div style={{ fontWeight: 'bold', fontSize: '18px' }}>Card Library</div>
            <button style={{
              background: 'none',
              border: 'none',
              color: '#FFFFFF',
              fontSize: '24px',
              cursor: 'pointer'
            }}>⚙</button>
          </div>

          {/* Stats Bar */}
          <div style={{
            height: '40px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            padding: '0 20px',
            background: '#2C2C3E',
            fontSize: '12px',
            gap: '8px'
          }}>
            <span>Collected: {stats.total}/85</span>
            <span>|</span>
            <span>Common: {stats.Common}</span>
            <span>|</span>
            <span>Rare: {stats.Rare}</span>
            <span>|</span>
            <span>Epic: {stats.Epic}</span>
            <span>|</span>
            <span>Legendary: {stats.Legendary}</span>
          </div>

          {/* Filter Bar */}
          <div style={{
            height: '50px',
            display: 'flex',
            alignItems: 'center',
            gap: '10px',
            padding: '0 20px'
          }}>
            <select 
              value={typeFilter}
              onChange={(e) => setTypeFilter(e.target.value)}
              style={{
                padding: '8px',
                borderRadius: '8px',
                border: 'none',
                background: '#5A7FC0',
                color: '#FFFFFF',
                fontFamily: 'Nunito',
                cursor: 'pointer'
              }}
            >
              <option>All Types</option>
              <option>Attack</option>
              <option>Defense</option>
              <option>Collection</option>
              <option>Synergy</option>
            </select>
            
            <select 
              value={rarityFilter}
              onChange={(e) => setRarityFilter(e.target.value)}
              style={{
                padding: '8px',
                borderRadius: '8px',
                border: 'none',
                background: '#5A7FC0',
                color: '#FFFFFF',
                fontFamily: 'Nunito',
                cursor: 'pointer'
              }}
            >
              <option>All Rarities</option>
              <option>Common</option>
              <option>Uncommon</option>
              <option>Rare</option>
              <option>Epic</option>
              <option>Legendary</option>
            </select>

            <input 
              type="text"
              placeholder="🔍 Search"
              value={searchTerm}
              onChange={(e) => setSearchTerm(e.target.value)}
              style={{
                flex: 1,
                padding: '8px',
                borderRadius: '8px',
                border: 'none',
                background: '#2C2C3E',
                color: '#FFFFFF',
                fontFamily: 'Nunito'
              }}
            />
          </div>

          {/* Card Grid - Adjusted height for bottom tab bar */}
          <div style={{
            height: 'calc(844px - 60px - 40px - 50px - 60px)',
            overflowY: 'auto',
            padding: '20px',
            display: 'grid',
            gridTemplateColumns: 'repeat(3, 1fr)',
            gap: '12px'
          }}>
            {filteredCards.map(card => (
              <div
                key={card.id}
                onClick={() => setSelectedCard(card)}
                style={{
                  width: '100px',
                  height: '140px',
                  background: getRarityGradient(card.rarity, card.owned),
                  borderRadius: '12px',
                  padding: '8px',
                  display: 'flex',
                  flexDirection: 'column',
                  justifyContent: 'space-between',
                  cursor: 'pointer',
                  position: 'relative',
                  boxShadow: '0 2px 4px rgba(0,0,0,0.2)',
                  filter: card.owned ? 'none' : 'grayscale(100%)',
                  opacity: card.owned ? 1 : 0.6
                }}
              >
                {/* Cost Badge */}
                <div style={{
                  position: 'absolute',
                  top: '8px',
                  right: '8px',
                  width: '20px',
                  height: '20px',
                  borderRadius: '50%',
                  background: '#1A1A2E',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  fontSize: '10px',
                  fontWeight: 'bold'
                }}>
                  {card.cost}
                </div>

                {/* Card Name */}
                <div style={{
                  fontSize: '12px',
                  fontWeight: 'bold',
                  marginTop: '20px',
                  textAlign: 'center'
                }}>
                  {card.name}
                </div>

                {/* Type Icon & Ownership */}
                <div style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center'
                }}>
                  <div style={{ fontSize: '16px' }}>
                    {card.type === 'Attack' ? '⚔️' : 
                     card.type === 'Defense' ? '🛡' :
                     card.type === 'Collection' ? '💎' : '✨'}
                  </div>
                  <div style={{ fontSize: '16px' }}>
                    {card.owned ? '✓' : '🔒'}
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Card Detail Modal */}
          {selectedCard && (
            <div style={{
              position: 'absolute',
              top: 0,
              left: 0,
              width: '100%',
              height: '100%',
              background: 'rgba(0,0,0,0.8)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              animation: 'fadeIn 0.3s',
              zIndex: 200
            }}>
              <div style={{
                width: '350px',
                height: '600px',
                background: '#2C2C3E',
                borderRadius: '16px',
                padding: '20px',
                position: 'relative'
              }}>
                <button 
                  onClick={() => setSelectedCard(null)}
                  style={{
                    position: 'absolute',
                    top: '10px',
                    right: '10px',
                    background: 'none',
                    border: 'none',
                    color: '#FFFFFF',
                    fontSize: '24px',
                    cursor: 'pointer'
                  }}
                >×</button>

                {/* Large Card */}
                <div style={{
                  width: '200px',
                  height: '280px',
                  margin: '20px auto',
                  background: getRarityGradient(selectedCard.rarity, selectedCard.owned),
                  borderRadius: '16px',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  fontSize: '48px'
                }}>
                  {selectedCard.type === 'Attack' ? '⚔️' : 
                   selectedCard.type === 'Defense' ? '🛡' :
                   selectedCard.type === 'Collection' ? '💎' : '✨'}
                </div>

                <div style={{ textAlign: 'center', marginTop: '20px' }}>
                  <div style={{ fontSize: '20px', fontWeight: 'bold', marginBottom: '10px' }}>
                    {selectedCard.name}
                  </div>
                  <div style={{ fontSize: '16px', fontWeight: 'bold', marginBottom: '10px' }}>
                    Cost: {selectedCard.cost} Energy
                  </div>
                  <div style={{ fontSize: '14px', marginBottom: '10px' }}>
                    Type: {selectedCard.type}
                  </div>
                  <div style={{ fontSize: '14px', marginBottom: '10px', color: '#AAAAAA' }}>
                    {selectedCard.description}
                  </div>
                  <div style={{
                    display: 'inline-block',
                    padding: '4px 12px',
                    borderRadius: '12px',
                    background: getRarityGradient(selectedCard.rarity, true),
                    fontSize: '12px',
                    fontWeight: 'bold'
                  }}>
                    {selectedCard.rarity}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Bottom Tab Bar */}
          <BottomTabBar activeTab="cards" />
        </div>
      );
    };

    ReactDOM.render(<CardLibrary />, document.getElementById('root'));
  </script>
</body>
</html>
